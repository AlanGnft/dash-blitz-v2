<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dash Blitz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

<canvas id="renderCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="label">Score</div>
  <div id="scoreDisplay">0</div>
</div>

<!-- Coin HUD -->
<div id="coinHud">
  <div class="coin-icon"></div>
  <div id="coinCount">0</div>
</div>

<!-- Start Screen -->
<div id="startScreen" class="overlay">
  <div class="logo">DASH BLITZ</div>
  <div class="deco"></div>
  <div class="tap-prompt">Tap to Play</div>
  <div class="hint">
    <span>← →</span> Switch lanes &nbsp;&nbsp; <span>↑ / Space</span> Jump &nbsp;&nbsp; <span>↓ / S</span> Slam<br>
    Swipe left / right / up / down on mobile
  </div>
  <div id="startBest">BEST: <span id="startBestDist">0</span>m &bull; <span id="startBestCoins">0</span> coins</div>
</div>

<!-- Game Over Screen -->
<div id="gameOverScreen" class="overlay hidden">
  <div class="gameover-title">Game Over</div>
  <div class="deco"></div>
  <div class="score-label">Final Score</div>
  <div class="final-score" id="finalScore">0</div>
  <div class="go-stats">
    <div class="go-sub">Coins collected: <span id="goCoins">0</span></div>
    <div class="go-best">Best score: <span id="goBestDist">0</span> &nbsp;|&nbsp; Best coins: <span id="goBestCoins">0</span></div>
    <div id="newBestBanner" class="hidden">NEW BEST!</div>
  </div>
  <button class="play-btn" id="playAgainBtn">Play Again</button>
</div>

<!-- Milestone flash text -->
<div id="milestoneText"></div>
<!-- Gold burst effect for 1000m milestone -->
<div id="goldBurst"></div>
<!-- Chaser danger vignette -->
<div id="dangerOverlay"></div>

<!-- Graze warning flash -->
<div id="grazeFlash"></div>
<!-- Death flash (white) -->
<div id="deathFlash"></div>
<!-- Fade to black (death outro) -->
<div id="fadeBlack"></div>

<!-- Babylon.js 7.x -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script type="module" src="js/main.js"></script>
</body>
</html>
